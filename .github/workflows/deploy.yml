name: Deploy Strava Insights

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION: us-east-1
  TF_VERSION: 1.6.0
  PYTHON_VERSION: "3.12"

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run tests
        run: pytest tests/ -v --cov=src --cov-report=term-missing

  deploy:
    name: Terraform Deploy
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Terraform Validate
        working-directory: terraform
        run: terraform validate

      - name: Terraform Plan
        working-directory: terraform
        run: terraform plan -var="strava_client_id=${{ secrets.STRAVA_CLIENT_ID }}" \
                            -var="strava_client_secret=${{ secrets.STRAVA_CLIENT_SECRET }}" \
                            -var="strava_refresh_token=${{ secrets.STRAVA_REFRESH_TOKEN }}"

      - name: Terraform Apply
        working-directory: terraform
        run: terraform apply -auto-approve \
                             -var="strava_client_id=${{ secrets.STRAVA_CLIENT_ID }}" \
                             -var="strava_client_secret=${{ secrets.STRAVA_CLIENT_SECRET }}" \
                             -var="strava_refresh_token=${{ secrets.STRAVA_REFRESH_TOKEN }}"
